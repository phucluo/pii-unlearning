# =============================================================================
# TOFU Evaluation — đánh giá model sau unlearning
# Metrics: PPL, ROUGE-L/1, Fluency, Truth Ratio, Probability, Model Utility
# Follows UnlearnPII evaluation methodology
#
# Usage:
#   python evaluate.py --config configs/tofu_eval.yaml
#   python evaluate.py --config configs/tofu_eval.yaml --model_path=outputs/unlearn/npo/forget10/tofu/qwen2.5-1.5b
# =============================================================================

# --- Model ---
model_family: qwen2.5-1.5b
model_path: outputs/unlearn/grad_ascent/forget10/tofu/qwen2.5-1.5b
quantization: none

# --- Dataset type ---
dataset: TOFU

# --- Eval Tasks ---
eval_tasks:
  # --- FORGET SET ---
  - name: eval_log_forget
    data_path: data/tofu
    split: forget10
    question_key: question
    answer_key: answer
    perturbed_answer_key: perturbed_answer
    tier: 1

  - name: eval_log_forget_paraphrase
    data_path: data/tofu
    split: forget10
    question_key: paraphrased_question
    answer_key: paraphrased_answer
    perturbed_answer_key: perturbed_answer
    tier: 2

  # --- RETAIN SET ---
  - name: eval_log_retain
    data_path: data/tofu
    split: retain90
    question_key: question
    answer_key: answer
    perturbed_answer_key: perturbed_answer
    tier: 1

  - name: eval_log_retain_paraphrase
    data_path: data/tofu
    split: retain90
    question_key: paraphrased_question
    answer_key: paraphrased_answer
    perturbed_answer_key: perturbed_answer
    tier: 2

  # --- GENERALIZATION (real-world) ---
  # These use perturbed answers for Truth Ratio + normalized Probability
  - name: eval_real_world
    data_path: data/test
    split: world_facts_perturbed
    question_key: question
    answer_key: answer
    perturbed_answer_key: perturbed_answer
    tier: 2

  - name: eval_real_author
    data_path: data/test
    split: real_authors_perturbed
    question_key: question
    answer_key: answer
    perturbed_answer_key: perturbed_answer
    tier: 2

# --- Generation ---
max_new_tokens: 128
max_length: 500
do_sample: false

# --- Other ---
batch_size: 4                  # A100: 4 safe, L4: 2 for NPO eval
bf16: true
save_dir: null                 # defaults to model_path/eval_results
